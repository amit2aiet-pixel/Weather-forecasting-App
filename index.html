<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Forecast App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#00c6ff,#0072ff);
padding:20px;
}

.container{
width:400px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
color:white;
text-align:center;
}

h1{
margin-bottom:25px;
font-size:32px;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:25px;
}

.search-box input{
flex:1;
padding:14px;
border:none;
border-radius:12px;
outline:none;
font-size:16px;
}

.search-box button{
padding:14px 18px;
border:none;
border-radius:12px;
background:#ffeb3b;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.search-box button:hover{
transform:scale(1.05);
}

.weather-icon{
font-size:75px;
margin:10px 0;
}

.temp{
font-size:55px;
font-weight:bold;
}

.city{
font-size:28px;
margin-bottom:15px;
}

.description{
font-size:18px;
margin-bottom:20px;
text-transform:capitalize;
}

.details{
display:flex;
justify-content:space-between;
gap:15px;
margin-top:20px;
}

.card{
flex:1;
background:rgba(255,255,255,.15);
padding:18px;
border-radius:18px;
}

.card h3{
margin-bottom:10px;
font-size:18px;
}

.forecast{
margin-top:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.day{
background:rgba(255,255,255,.15);
padding:14px;
border-radius:15px;
font-size:14px;
}

.day span{
display:block;
margin:8px 0;
font-size:24px;
}

@media(max-width:450px){

.container{
width:100%;
}

.search-box{
flex-direction:column;
}

.details{
flex-direction:column;
}

.forecast{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Weather App</h1>

<div class="search-box">
<input type="text" id="cityInput" placeholder="Enter City">
<button onclick="getWeather()">Search</button>
</div>

<div class="weather-icon" id="icon">☀️</div>

<div class="temp" id="temp">--°C</div>

<div class="city" id="city">Search City</div>

<div class="description" id="description">
Weather Info
</div>

<div class="details">

<div class="card">
<h3>Humidity</h3>
<p id="humidity">--%</p>
</div>

<div class="card">
<h3>Wind</h3>
<p id="wind">-- km/h</p>
</div>

</div>

<div class="forecast">

<div class="day">
Mon
<span>☀️</span>
34°C
</div>

<div class="day">
Tue
<span>🌧️</span>
28°C
</div>

<div class="day">
Wed
<span>⛅</span>
31°C
</div>

</div>

</div>

<script>

async function getWeather(){

let city=document.getElementById("cityInput").value;

if(city==""){
alert("Please enter city name");
return;
}

let apiKey="6db240b068d66c7cc91d512195c969b0";

let url=
`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`;

let response=await fetch(url);

let data=await response.json();

if(data.cod=="404"){
alert("City not found");
return;
}

document.getElementById("city").innerText=data.name;

document.getElementById("temp").innerText=
Math.round(data.main.temp)+"°C";

document.getElementById("humidity").innerText=
data.main.humidity+"%";

document.getElementById("wind").innerText=
data.wind.speed+" km/h";

document.getElementById("description").innerText=
data.weather[0].description;

let weather=data.weather[0].main;

let icon="☀️";

if(weather=="Clouds"){
icon="⛅";
}
else if(weather=="Rain"){
icon="🌧️";
}
else if(weather=="Thunderstorm"){
icon="🌩️";
}
else if(weather=="Snow"){
icon="❄️";
}
else if(weather=="Clear"){
icon="☀️";
}

document.getElementById("icon").innerText=icon;

}

</script>

</body>
</html>
